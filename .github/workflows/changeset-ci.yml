name: Changeset CI

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify Changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Trust and install tools via mise
        run: |
          mise trust --yes
          mise install node

      - name: Enable Corepack
        run: |
          corepack enable
          mise reshim node

      - name: Install dependencies
        run: |
          yarn install

      - name: Check for changeset
        if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
        run: yarn changeset status --since=origin/${{ github.base_ref }}
