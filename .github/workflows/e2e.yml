name: E2E

on:
  pull_request:
    types:
      - labeled
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ios-e2e:
    name: iOS E2E
    runs-on: macos-15
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.pull_request.labels.*.name, 'E2E') &&
        (github.event.action != 'labeled' || github.event.label.name == 'E2E')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Corepack
        run: |
          corepack enable

      - name: Install dependencies
        run: |
          yarn install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: examples/v0.81.1

      - name: Install iOS pods
        working-directory: examples/v0.81.1
        run: |
          bundle exec pod install --project-directory=ios

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS simulator
        run: |
          SIMULATOR_UDID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "No available iPhone simulator found." >&2
            exit 1
          fi
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

      - name: Build and install iOS release app
        working-directory: examples/v0.81.1
        run: |
          yarn react-native run-ios --mode Release --udid "$SIMULATOR_UDID"

      - name: Run iOS E2E
        run: |
          yarn test:e2e:ios

      - name: Upload iOS E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-artifacts
          if-no-files-found: ignore
          path: |
            ~/.maestro/tests

  android-e2e:
    name: Android E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.pull_request.labels.*.name, 'E2E') &&
        (github.event.action != 'labeled' || github.event.label.name == 'E2E')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Corepack
        run: |
          corepack enable

      - name: Install dependencies
        run: |
          yarn install

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: |
            adb kill-server
            adb start-server
            adb wait-for-device
            timeout 180 bash -c 'until [[ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" == "1" ]]; do sleep 5; done'
            adb shell input keyevent 82 || true
            yarn workspace react-native-nitro-geolocation-example android:release
            yarn test:e2e:android

      - name: Upload Android E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-artifacts
          if-no-files-found: ignore
          path: |
            ~/.maestro/tests
