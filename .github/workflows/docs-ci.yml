name: docs-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Trust and install tools via mise
        run: |
          mise trust --yes
          mise install node

      - name: Enable Corepack
        run: |
          corepack enable
          mise reshim node

      - name: Install dependencies
        run: |
          yarn install

      - name: Build
        working-directory: docs
        run: |
          yarn build
