appId: nitrogeolocation.example
---
# Arms a post-reboot proof window before the shell wrapper reboots the emulator.

- openLink:
    link: nitrogeolocation://app/background-long-run
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/background-long-run
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Background Long Run E2E"
    timeout: 10000

- tapOn:
    id: "e2e-action-background-long-run-arm-reboot-button"
- extendedWaitUntil:
    visible: "Reboot probe: passed"
    timeout: 15000
