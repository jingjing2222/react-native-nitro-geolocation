appId: nitrogeolocation.example
---
# Android long-run flow. This is intentionally not part of all-tests.yaml.
# It backgrounds the app, injects outside/inside/outside movement, then verifies
# native storage, Headless JS delivery, and geofence transitions.

- launchApp:
    clearState: true
    permissions:
      all: allow

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/background-long-run
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/background-long-run
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Background Long Run E2E"
    timeout: 10000

- tapOn:
    id: "e2e-action-background-long-run-prepare-button"
- extendedWaitUntil:
    visible: "Prepare: passed"
    timeout: 20000

- setLocation:
    latitude: 37.563
    longitude: 126.97
- pressKey: Home
- setLocation:
    latitude: 37.5665
    longitude: 126.978
- runScript: scripts/wait-15s.js
- setLocation:
    latitude: 37.563
    longitude: 126.97
- runScript: scripts/wait-15s.js

- openLink:
    link: nitrogeolocation://app/background-long-run
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/background-long-run
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Background Long Run E2E"
    timeout: 10000

- tapOn:
    id: "e2e-action-background-long-run-refresh-button"
- tapOn:
    id: "e2e-action-background-long-run-validate-location-button"
- extendedWaitUntil:
    visible: "Background location: passed"
    timeout: 15000

- tapOn:
    id: "e2e-action-background-long-run-validate-headless-button"
- extendedWaitUntil:
    visible: "Headless: passed"
    timeout: 15000

- tapOn:
    id: "e2e-action-background-long-run-validate-geofence-button"
- extendedWaitUntil:
    visible: "Geofence transition: passed"
    timeout: 15000

- tapOn:
    id: "e2e-action-background-long-run-platform-limits-button"
- extendedWaitUntil:
    visible: "Platform limits: passed"
    timeout: 10000
