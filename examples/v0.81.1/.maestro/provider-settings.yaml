appId: nitrogeolocation.example
---
# User flow: a field worker prepares an accurate Android check-in by checking
# real provider state, requesting Android's native location settings resolution,
# then confirming the current position.

- launchApp:
    clearState: true
    permissions:
      android.permission.ACCESS_COARSE_LOCATION: allow
      android.permission.ACCESS_FINE_LOCATION: allow

- stopApp

- openLink:
    link: nitrogeolocation://app/provider-settings
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Accurate Check-In"
    timeout: 10000

- tapOn:
    id: "e2e-action-provider-settings-check-device-button"
- extendedWaitUntil:
    visible: "Services: enabled"
    timeout: 10000

- assertVisible:
    id: "provider-settings-status"
- assertVisible:
    id: "provider-settings-services"
- assertVisible:
    id: "provider-settings-gps"
- assertVisible:
    id: "provider-settings-network"

- tapOn:
    id: "e2e-action-provider-settings-prepare-check-in-button"
- tapOn:
    text: "Turn on|OK|확인|켜기|사용"
    optional: true
- extendedWaitUntil:
    visible: "Settings: ready"
    timeout: 15000

- assertVisible: "Services: enabled"
- assertVisible: "GPS: enabled"
- assertVisible: "Network: enabled"
- assertVisible: "Provider readiness: ready"
- assertVisible:
    id: "provider-settings-result"

- setLocation:
    latitude: 37.5665
    longitude: 126.978
- waitForAnimationToEnd

- tapOn:
    id: "e2e-action-provider-settings-confirm-location-button"
- assertVisible:
    id: "provider-position"
- assertVisible:
    id: "provider-latitude"
- assertVisible:
    id: "provider-longitude"
- assertVisible:
    id: "provider-accuracy"
- assertVisible:
    id: "provider-used"
