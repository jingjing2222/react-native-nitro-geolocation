appId: nitrogeolocation.example
---
# Run after background-long-run-android.yaml and an external adb reboot.
# The shell script injects one post-boot emulator location before this flow.

- openLink:
    link: nitrogeolocation://app/background-long-run
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/background-long-run
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Background Long Run E2E"
    timeout: 20000

- tapOn:
    id: "e2e-action-background-long-run-refresh-button"
- tapOn:
    id: "e2e-action-background-long-run-validate-reboot-button"
- extendedWaitUntil:
    visible: "Reboot restore: passed"
    timeout: 20000

- tapOn:
    id: "e2e-action-background-long-run-validate-location-button"
- extendedWaitUntil:
    visible: "Background location: passed"
    timeout: 20000

- tapOn:
    id: "e2e-action-background-long-run-validate-geofence-button"
- extendedWaitUntil:
    visible: "Geofence transition: passed"
    timeout: 20000
