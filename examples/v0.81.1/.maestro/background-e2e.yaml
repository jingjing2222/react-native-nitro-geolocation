appId: nitrogeolocation.example
---
# Background subsystem E2E page mixes expected failure and success contracts.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/background-e2e
- tapOn:
    text: "열기|Open"
    optional: true

- extendedWaitUntil:
    visible: "Background Location E2E"
    timeout: 10000

- tapOn:
    id: "background-e2e-refresh-button"
- assertVisible:
    id: "background-e2e-status"

- tapOn:
    id: "background-e2e-invalid-config-button"
- scrollUntilVisible:
    element: "Missing notification: passed"
    direction: DOWN
    timeout: 10000

- scrollUntilVisible:
    element: "Configure Background"
    direction: DOWN
    centerElement: true
- tapOn:
    text: "Configure Background"
- scrollUntilVisible:
    element: "Configure: passed"
    direction: DOWN
    timeout: 30000

- scrollUntilVisible:
    element: "Start Stop Tracking"
    direction: UP
    centerElement: true
- tapOn:
    text: "Start Stop Tracking"
- scrollUntilVisible:
    element: "Start stop: passed"
    direction: DOWN
    timeout: 30000

- scrollUntilVisible:
    element: "Register Geofence"
    direction: UP
    centerElement: true
- tapOn:
    text: "Register Geofence"
- scrollUntilVisible:
    element: "Geofence: passed"
    direction: DOWN
    timeout: 30000

- scrollUntilVisible:
    element: "Recover Stored Events"
    direction: UP
    centerElement: true
- tapOn:
    text: "Recover Stored Events"
- scrollUntilVisible:
    element: "Storage: passed"
    direction: DOWN
    timeout: 30000

- scrollUntilVisible:
    element: "Run Native Sync"
    direction: UP
    centerElement: true
- tapOn:
    text: "Run Native Sync"
- scrollUntilVisible:
    element: "Sync: passed"
    direction: DOWN
    timeout: 30000
