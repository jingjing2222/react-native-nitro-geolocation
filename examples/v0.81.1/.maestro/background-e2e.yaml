appId: nitrogeolocation.example
---
# Background subsystem E2E page mixes expected failure and success contracts.

- launchApp:
    clearState: true
    permissions:
      all: allow

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/background-e2e
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/background-e2e
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Background Location E2E"
    timeout: 10000

- tapOn:
    id: "e2e-action-background-e2e-refresh-button"
- assertVisible:
    id: "background-e2e-status"

- tapOn:
    id: "e2e-action-background-e2e-invalid-config-button"
- tapOn:
    id: "e2e-action-background-e2e-configure-button"
- tapOn:
    id: "e2e-action-background-e2e-start-stop-button"
- tapOn:
    id: "e2e-action-background-e2e-geofence-button"
- tapOn:
    id: "e2e-action-background-e2e-storage-button"
- tapOn:
    id: "e2e-action-background-e2e-sync-button"
