appId: nitrogeolocation.example
---
# getLocationAvailability(): prove a real native fix makes availability true,
# and permission denied availability agrees with getCurrentPosition rejection.

- launchApp:
    clearState: true
    permissions:
      all: allow

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/location-availability
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/location-availability
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Availability contract tied to native fixes and permission failures"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "e2e-action-location-availability-run-available-button"

- extendedWaitUntil:
    visible: "Availability: passed"
    timeout: 60000

- assertVisible:
    id: "location-availability-available-result"
- assertVisible:
    text: ".*37.566500, 126.978000.*"
- assertVisible:
    text: ".*Availability was true after native fix.*"

- stopApp

- launchApp:
    permissions:
      all: deny

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/location-availability
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/location-availability
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Availability contract tied to native fixes and permission failures"
    timeout: 10000

- tapOn:
    id: "e2e-action-location-availability-run-denied-button"

- assertVisible:
    id: "location-availability-denied-result"
- assertVisible:
    text: ".*permissionDenied availability matched.*"
