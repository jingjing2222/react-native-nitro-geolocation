appId: nitrogeolocation.example
---
# getLastKnownPosition(): prove cached success plus stale-cache and permission-denied rejections.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/last-known-position?case=allowed
- runFlow:
    when:
      platform: iOS
      visible: "Open in.*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/last-known-position?case=allowed
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cached location API contract with rejection paths"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "e2e-action-last-known-position-run-stale-button"

- extendedWaitUntil:
    visible: "Stale cache: passed"
    timeout: 10000

- assertVisible:
    id: "last-known-position-stale-result"
- assertVisible:
    text: ".*POSITION_UNAVAILABLE.*"
- assertVisible:
    text: ".*without starting a fresh request.*"

- tapOn:
    id: "e2e-action-last-known-position-run-system-button"

- assertVisible:
    id: "last-known-position-system-result"
- assertVisible:
    text: ".*37.566500, 126.978000.*"
- assertVisible:
    text: ".*without getCurrentPosition.*"

- tapOn:
    id: "e2e-action-last-known-position-run-cache-button"

- assertVisible:
    id: "last-known-position-cache-result"
- assertVisible:
    text: ".*37.566500, 126.978000.*"
- assertVisible:
    text: ".*timestamp delta.*cache read.*ms.*"

- stopApp

- launchApp:
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/last-known-position?case=denied
- runFlow:
    when:
      platform: iOS
      visible: "Open in.*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/last-known-position?case=denied
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Cached location API contract with rejection paths"
    timeout: 10000

- tapOn:
    id: "e2e-action-last-known-position-run-denied-button"

- extendedWaitUntil:
    visible: "Permission denied: passed"
    timeout: 10000

- assertVisible:
    id: "last-known-position-denied-result"
- assertVisible:
    text: ".*PERMISSION_DENIED.*"
- assertVisible:
    text: ".*did not bypass native permission checks.*"
