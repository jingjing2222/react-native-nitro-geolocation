appId: nitrogeolocation.example
---
# User flow: a field worker opens the check-in screen while Android location
# services are disabled, sees the device is not ready, asks Android for the
# required settings, then declines the system resolution dialog.
#
# This flow requires the Android master location switch to be disabled before
# it starts. Use scripts/test-e2e-android.sh so the device state is restored.

- launchApp:
    clearState: true
    permissions:
      android.permission.ACCESS_COARSE_LOCATION: allow
      android.permission.ACCESS_FINE_LOCATION: allow

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/provider-settings
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/provider-settings
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Accurate Check-In"
    timeout: 10000

- tapOn:
    id: "e2e-action-provider-settings-check-device-button"
- extendedWaitUntil:
    visible: "Services: disabled"
    timeout: 10000

- assertVisible: "GPS: disabled"
- assertVisible: "Network: disabled"
- assertVisible: "Provider readiness: not ready"

- tapOn:
    id: "e2e-action-provider-settings-prepare-check-in-button"

- tapOn:
    text: "No thanks|Cancel|취소|아니요|거부"

- extendedWaitUntil:
    visible: "Settings: blocked"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "provider-settings-error-name"
    timeout: 10000
- assertVisible: "Provider readiness: not ready"
