appId: nitrogeolocation.example
---
# Test 1: Permission Check and Request
- launchApp:
    clearState: true
    permissions:
      all: allow
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 30000
- stopApp
- openLink:
    link: nitrogeolocation://app/permission-check
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/permission-check
- waitForAnimationToEnd

# Navigate directly to the permission contract page.
- extendedWaitUntil:
    visible: "1. Permission Management"
    timeout: 30000

# Check initial permission status
- tapOn:
    id: "e2e-action-permission-check-button"

# Request permission
- tapOn:
    id: "e2e-action-permission-request-button"

# Wait for permission dialog and result
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

# Verify permission is now granted
- tapOn:
    id: "e2e-action-permission-check-button"
- assertVisible: "granted ✅"
