appId: nitrogeolocation.example
---
# Run platform-compatible geolocation tests in sequence.
# Web E2E is intentionally separate because it requires a local web server.
# Android provider-selection proof is gated because it needs a connected
# physical Android device with live, non-mocked providers.

- runFlow:
    when:
      platform: Android
    file: issue-119-android.yaml
- runFlow:
    when:
      platform: Android
    file: issue-120-android.yaml
- runFlow:
    when:
      platform: Android
    file: issue-121-android.yaml
- runFlow:
    when:
      platform: Android
    file: issue-122-android.yaml
- runFlow:
    when:
      platform: iOS
    file: issue-119-ios.yaml
- runFlow:
    when:
      platform: iOS
    file: issue-120-ios.yaml
- runFlow:
    when:
      platform: iOS
    file: issue-121-ios.yaml
- runFlow:
    when:
      platform: iOS
    file: issue-122-ios.yaml
- runFlow: permission-check.yaml
- runFlow:
    when:
      platform: Android
      true: ${RUN_ANDROID_PROVIDER_SELECTION == '1'}
    file: android-provider-selection.yaml
- runFlow:
    when:
      platform: Android
    file: android-request-options.yaml
- runFlow:
    when:
      platform: Android
    file: android-request-options-watch.yaml
- runFlow:
    when:
      platform: Android
    file: android-request-options-errors.yaml
- runFlow: current-position.yaml
- runFlow: watch-position.yaml
- runFlow: location-simulation.yaml
- runFlow: accuracy-presets.yaml
- runFlow: last-known-position.yaml
- runFlow: geocoding.yaml
- runFlow: location-availability.yaml
- runFlow: heading.yaml
- runFlow:
    when:
      platform: iOS
    file: ios-location-tuning.yaml
- runFlow:
    when:
      platform: iOS
    file: ios-accuracy-authorization.yaml
- runFlow:
    when:
      platform: iOS
    file: ios-release-options-bridge.yaml
- runFlow:
    when:
      platform: Android
    file: issue-67-android-coarse-location.yaml
- runFlow:
    when:
      platform: Android
    file: provider-settings.yaml
- runFlow: background-e2e.yaml
- runFlow:
    when:
      platform: Android
    file: mocked-metadata-android-true.yaml
- runFlow:
    when:
      platform: iOS
    file: mocked-metadata-ios-true.yaml
- runFlow: api-errors.yaml
- runFlow: compat-api.yaml
