appId: nitrogeolocation.example
---
# Watch position contract: successful native watcher plus denied permission
# rejection, with assertions on actual coordinate text.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/watch-position
- tapOn:
    text: "열기|Open"
    optional: true

# Ensure permission is granted
- tapOn: "Request"
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

# Navigate within the watch-position contract page
- scrollUntilVisible:
    element: "3. Watch Position (Hook)"
    direction: DOWN

# Provide a real device location before exercising the native watcher.
- setLocation:
    latitude: 37.5665
    longitude: 126.9780

# Verify initial state is not watching
- assertVisible: "Not Watching 🔴"

# Enable watching by toggling switch directly
- tapOn:
    id: "watch-toggle-switch"

# Verify watching is active
- extendedWaitUntil:
    visible: "Watching 🟢"
    timeout: 10000

# Wait for position update
- scrollUntilVisible:
    element: "Watched Position (Live)"
    direction: DOWN
    centerElement: true
    timeout: 15000

# Verify position data is displayed
- assertVisible:
    id: "position-info"
- assertVisible:
    id: "latitude-text"
- assertVisible:
    text: "Latitude: 37\\.566500"
- scrollUntilVisible:
    element:
      id: "longitude-text"
    direction: DOWN
    centerElement: true
- assertVisible:
    id: "longitude-text"
- assertVisible:
    text: "Longitude: 126\\.978000"

# Wait 5 seconds to see if position updates
- waitForAnimationToEnd

# Disable watching
- scrollUntilVisible:
    element:
      id: "watch-toggle-switch"
    direction: UP
    centerElement: true
- tapOn:
    id: "watch-toggle-switch"

# Verify watching stopped
- assertVisible: "Not Watching 🔴"

- launchApp:
    clearState: true
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/watch-position
- tapOn:
    text: "열기|Open"
    optional: true

- scrollUntilVisible:
    element: "3. Watch Position (Hook)"
    direction: DOWN

- tapOn:
    id: "watch-toggle-switch"

- scrollUntilVisible:
    element: "Error: .*(Location permission|denied access).*"
    direction: DOWN
    visibilityPercentage: 30
    timeout: 10000

- assertVisible:
    text: "Error: .*(Location permission|denied access).*"
