appId: nitrogeolocation.example
---
# Watch position contract: successful native watcher plus denied permission
# rejection, with assertions on actual coordinate text.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/watch-position
- runFlow:
    when:
      platform: iOS
      visible: "Open in.*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/watch-position
- waitForAnimationToEnd

# Ensure permission is granted
- tapOn:
    id: "e2e-action-permission-request-button"
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

# Navigate within the watch-position contract page
- setLocation:
    latitude: 37.5665
    longitude: 126.9780

# Verify initial state is not watching
- assertVisible: "Status: Not Watching 🔴"

# Enable watching by toggling switch directly
- tapOn:
    id: "e2e-action-watch-toggle-button"

# Verify watching is active
- extendedWaitUntil:
    visible: "Status: Watching 🟢"
    timeout: 10000

# Wait for position update
- assertVisible:
    id: "position-info"
- assertVisible:
    id: "latitude-text"
- assertVisible:
    text: "Latitude: 37\\.566500"
- assertVisible:
    id: "longitude-text"
- assertVisible:
    text: "Longitude: 126\\.978000"

# Wait 5 seconds to see if position updates
- waitForAnimationToEnd

# Disable watching
- tapOn:
    id: "e2e-action-watch-toggle-button"

# Verify watching stopped
- assertVisible: "Status: Not Watching 🔴"

- launchApp:
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/watch-position
- runFlow:
    when:
      platform: iOS
      visible: "Open in.*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/watch-position
- waitForAnimationToEnd

- tapOn:
    id: "e2e-action-watch-toggle-button"

- assertVisible:
    text: "Error: .*(Location permission|denied access).*"
