appId: nitrogeolocation.example
---
# Web Modern API contract through react-native-webview.
# Requires examples/web-e2e dev server on port 4173.

- launchApp:
    clearState: true
    permissions:
      all: allow

- setLocation:
    latitude: 37.5665
    longitude: 126.9780

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 20000

- stopApp

- openLink:
    link: nitrogeolocation://app/web-e2e?autorun=success
- waitForAnimationToEnd

- tapOn:
    text: "Allow"
    optional: true

- tapOn:
    text: "Allow"
    optional: true

- extendedWaitUntil:
    visible: "get-current-position: running: move-for-get-current-position"
    timeout: 40000

- setLocation:
    latitude: 37.5671
    longitude: 126.9786

- extendedWaitUntil:
    visible: "watch-position: running: move-for-watch-position"
    timeout: 40000

- setLocation:
    latitude: 37.5678
    longitude: 126.9793

- extendedWaitUntil:
    visible: "unwatch: running: move-for-unwatch-initial"
    timeout: 40000

- setLocation:
    latitude: 37.5685
    longitude: 126.98

- extendedWaitUntil:
    visible: "unwatch: running: move-after-unwatch"
    timeout: 40000

- setLocation:
    latitude: 37.5692
    longitude: 126.9807

- extendedWaitUntil:
    visible: "stop-observing: running: move-for-stop-observing-initial"
    timeout: 40000

- setLocation:
    latitude: 37.5699
    longitude: 126.9814

- extendedWaitUntil:
    visible: "stop-observing: running: move-after-stop-observing"
    timeout: 40000

- setLocation:
    latitude: 37.5706
    longitude: 126.9821

- extendedWaitUntil:
    visible: "compat-get-current-position: running: move-for-compat-get-current-position"
    timeout: 40000

- setLocation:
    latitude: 37.5713
    longitude: 126.9828

- extendedWaitUntil:
    visible: "compat-watch-position: running: move-for-compat-watch-position"
    timeout: 40000

- setLocation:
    latitude: 37.572
    longitude: 126.9835

- extendedWaitUntil:
    visible: "compat-watch-position: running: move-after-compat-watch-position"
    timeout: 40000

- setLocation:
    latitude: 37.5727
    longitude: 126.9842

- extendedWaitUntil:
    visible: "compat-stop-observing: running: move-for-compat-stop-observing-initial"
    timeout: 40000

- setLocation:
    latitude: 37.5734
    longitude: 126.9849

- extendedWaitUntil:
    visible: "compat-stop-observing: running: move-after-compat-stop-observing"
    timeout: 40000

- setLocation:
    latitude: 37.5741
    longitude: 126.9856

- extendedWaitUntil:
    visible: "success-suite: pass"
    timeout: 20000

- launchApp:
    clearState: true
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 20000

- stopApp

- openLink:
    link: nitrogeolocation://app/web-e2e?autorun=denied
- waitForAnimationToEnd

- tapOn:
    text: "Don’t allow|Don't allow|허용 안함|허용 안 함|허용하지 않음"
    optional: true

- extendedWaitUntil:
    visible: "Nitro Geolocation Web E2E"
    timeout: 20000

- tapOn:
    text: "Don’t allow|Don't allow|허용 안함|허용 안 함|허용하지 않음"
    optional: true

- extendedWaitUntil:
    visible: "permission-denied: pass"
    timeout: 20000

- assertVisible: "permission denied -> PERMISSION_DENIED"
