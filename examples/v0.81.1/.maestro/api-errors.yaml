appId: nitrogeolocation.example
---
# Modern API error contract: trigger real native errors, display their
# structured { code, message } shape, then assert the rendered result.

- launchApp:
    clearState: true
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/api-errors
- runFlow:
    when:
      platform: iOS
      visible: ".*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Modern API error contract"
    timeout: 10000

- tapOn:
    id: "e2e-action-api-errors-get-position-button"
- assertVisible:
    id: "api-error-details"
- assertVisible:
    text: "Code: 1"
- assertVisible:
    text: "Name: PERMISSION_DENIED"
- assertVisible:
    id: "api-error-message"

- launchApp:
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/api-errors
- runFlow:
    when:
      platform: iOS
      visible: ".*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Modern API error contract"
    timeout: 10000

- tapOn:
    id: "e2e-action-api-errors-request-permission-button"
- tapOn:
    text: "Allow While Using App|앱을 사용하는 동안 허용|OK"
    optional: true
- extendedWaitUntil:
    visible: "granted"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "e2e-action-api-errors-get-position-button"
- assertVisible:
    id: "api-error-position"
- assertVisible:
    id: "api-error-latitude"
- assertVisible:
    id: "api-error-longitude"
- assertVisible:
    id: "api-error-accuracy"

- tapOn:
    id: "e2e-action-api-errors-force-timeout-button"
- extendedWaitUntil:
    visible: "Result: error"
    timeout: 10000

- assertVisible:
    id: "api-error-details"
- assertVisible:
    text: "Code: 3"
- assertVisible:
    text: "Name: TIMEOUT"
- assertVisible:
    id: "api-error-message"

- assertVisible:
    id: "api-error-code-contract"
- assertVisible:
    id: "api-error-contract-INTERNAL_ERROR"
- assertVisible:
    id: "api-error-contract-PERMISSION_DENIED"
- assertVisible:
    id: "api-error-contract-POSITION_UNAVAILABLE"
- assertVisible:
    id: "api-error-contract-TIMEOUT"
- assertVisible:
    id: "api-error-contract-PLAY_SERVICE_NOT_AVAILABLE"
- assertVisible:
    id: "api-error-contract-SETTINGS_NOT_SATISFIED"
