appId: nitrogeolocation.example
---
# Modern API error contract: request permission, exercise the native position
# path, then force a deterministic timeout error.

- launchApp

- openLink:
    link: nitrogeolocation://app/api-errors
- tapOn:
    text: "열기|Open"
    optional: true

- extendedWaitUntil:
    visible: "Modern API error contract"
    timeout: 10000

- tapOn: "Request Permission"
- tapOn:
    text: "Allow While Using App|앱을 사용하는 동안 허용|OK"
    optional: true
- extendedWaitUntil:
    visible: "granted"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn: "Get Position"
- extendedWaitUntil:
    visible: "Current Position"
    timeout: 15000

- assertVisible:
    id: "api-error-position"
- assertVisible:
    id: "api-error-latitude"
- assertVisible:
    id: "api-error-longitude"
- assertVisible:
    id: "api-error-accuracy"

- scrollUntilVisible:
    element: "3. Error Handling"
    direction: DOWN

- tapOn: "Force Timeout"
- extendedWaitUntil:
    visible: "Result: error"
    timeout: 10000

- assertVisible:
    id: "api-error-details"
- assertVisible: "Code: 3"
- assertVisible: "Name: TIMEOUT"
