appId: nitrogeolocation.example
---
# Android contract: compat response remains the legacy drop-in shape and does
# not expose modern mocked/provider metadata.

- launchApp:
    clearState: true
    permissions:
      android.permission.ACCESS_COARSE_LOCATION: allow
      android.permission.ACCESS_FINE_LOCATION: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- openLink:
    link: nitrogeolocation://app/compat-metadata
- tapOn:
    text: "열기|Open"
    optional: true

- extendedWaitUntil:
    visible: "Legacy response remains unchanged"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn: "Get Position"

- extendedWaitUntil:
    visible: "Compat metadata: absent"
    timeout: 15000

- assertVisible:
    id: "position-info"
- assertVisible:
    id: "compat-metadata-status"
- assertVisible: "Compat metadata: absent"
