appId: nitrogeolocation.example
---
# Heading APIs: prove getHeading/watchHeading produce real sensor readings and
# invalid/permission-denied cases reject through the native error contract.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/heading
- runFlow:
    when:
      platform: iOS
      visible: ".*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Compass-style heading contract with watch and rejection paths"
    timeout: 10000

- tapOn:
    id: "e2e-action-heading-run-current-button"

- extendedWaitUntil:
    visible: "Single heading: passed"
    timeout: 20000

- assertVisible:
    id: "heading-current-result"
- assertVisible:
    text: ".*Single heading .*deg.*resolved in .*ms.*"

- tapOn:
    id: "e2e-action-heading-run-watch-button"

- assertVisible:
    id: "heading-watch-result"
- assertVisible:
    text: ".*Watch delivered 2 real heading updates.*"

- tapOn:
    id: "e2e-action-heading-run-invalid-button"

- assertVisible:
    id: "heading-invalid-result"
- assertVisible:
    text: ".*Invalid headingFilter rejected.*"

- stopApp

- launchApp:
    clearState: true
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/heading
- runFlow:
    when:
      platform: iOS
      visible: ".*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Compass-style heading contract with watch and rejection paths"
    timeout: 10000

- tapOn:
    id: "e2e-action-heading-run-denied-button"

- assertVisible:
    id: "heading-denied-result"
- assertVisible:
    text: ".*PERMISSION_DENIED.*heading follows native permission checks.*"
