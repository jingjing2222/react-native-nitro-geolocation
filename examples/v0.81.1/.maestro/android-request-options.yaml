appId: nitrogeolocation.example
---
# Android request options: exercise Fused request controls, cache isolation,
# watch auto-stop, heading-token cleanup, invalid options, and permission gates.

- launchApp:
    clearState: true
    permissions:
      android.permission.ACCESS_COARSE_LOCATION: allow
      android.permission.ACCESS_FINE_LOCATION: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/android-request-options
- tapOn:
    text: "열기|Open"
    optional: true

- extendedWaitUntil:
    visible: "Fused request controls with update limits and rejection paths"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "android-request-options-run-fused-button"

- extendedWaitUntil:
    visible: "Fused request: passed"
    timeout: 60000

- assertVisible:
    id: "android-request-options-fused-result"
- assertVisible:
    text: ".*Fused coarse request returned 37\\.[0-9]+, 126\\.[0-9]+; provider=fused.*"
- assertVisible:
    text: ".*provider=.*"

- scrollUntilVisible:
    element: "Run One-Shot Distance Filter"
    direction: DOWN
    centerElement: true

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    text: "Run One-Shot Distance Filter"

- scrollUntilVisible:
    element: "One-shot distance: passed"
    direction: DOWN
    timeout: 15000

- assertVisible:
    id: "android-request-options-one-shot-distance-result"
- assertVisible:
    text: ".*ignored watch-only distanceFilter=1000000m.*"

- scrollUntilVisible:
    element: "Run Coarse Cache Isolation"
    direction: DOWN
    centerElement: true

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    text: "Run Coarse Cache Isolation"

- scrollUntilVisible:
    element: "Coarse cache: passed"
    direction: DOWN
    timeout: 30000

- assertVisible:
    id: "android-request-options-coarse-cache-result"
- assertVisible:
    text: ".*POSITION_UNAVAILABLE.*coarse cache-only read did not reuse.*"

- scrollUntilVisible:
    element: "Run Mixed Watch Granularity"
    direction: DOWN
    centerElement: true

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    text: "Run Mixed Watch Granularity"

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- scrollUntilVisible:
    element: "Mixed watch: passed"
    direction: DOWN
    timeout: 30000

- assertVisible:
    id: "android-request-options-mixed-watch-result"
- assertVisible:
    text: ".*Coarse watcher stayed coarse.*fine watcher received.*"

- scrollUntilVisible:
    element: "Run Max Updates Watch"
    direction: DOWN
    centerElement: true

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    text: "Run Max Updates Watch"

- setLocation:
    latitude: 37.5667
    longitude: 126.9782
- waitForAnimationToEnd
- setLocation:
    latitude: 37.5669
    longitude: 126.9784

- extendedWaitUntil:
    visible: "Max updates: passed"
    timeout: 30000

- assertVisible:
    id: "android-request-options-max-updates-result"
- assertVisible:
    text: ".*Watch stopped after 1 update with maxUpdates=1.*"

- scrollUntilVisible:
    element: "Run Heading Unwatch Isolation"
    direction: DOWN
    centerElement: true

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    text: "Run Heading Unwatch Isolation"

- setLocation:
    latitude: 37.5667
    longitude: 126.9782
- waitForAnimationToEnd
- setLocation:
    latitude: 37.5669
    longitude: 126.9784

- scrollUntilVisible:
    element: "Heading unwatch: passed"
    direction: DOWN
    timeout: 30000

- assertVisible:
    id: "android-request-options-heading-unwatch-result"
- assertVisible:
    text: ".*Heading unwatch left maxUpdates=1 location watch stopped.*"

- scrollUntilVisible:
    element: "Run Invalid Max Updates"
    direction: DOWN
    centerElement: true

- tapOn:
    text: "Run Invalid Max Updates"

- scrollUntilVisible:
    element: "Invalid maxUpdates: passed"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "android-request-options-invalid-result"
- assertVisible:
    text: ".*maxUpdates=0 rejected.*"

- stopApp

- launchApp:
    clearState: true
    permissions:
      all: deny
      android.permission.ACCESS_COARSE_LOCATION: allow
      android.permission.ACCESS_FINE_LOCATION: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/android-request-options
- tapOn:
    text: "열기|Open"
    optional: true

- extendedWaitUntil:
    visible: "Fused request controls with update limits and rejection paths"
    timeout: 10000

- scrollUntilVisible:
    element: "Run Fine Permission Gate"
    direction: DOWN
    centerElement: true

- tapOn:
    text: "Run Fine Permission Gate"

- scrollUntilVisible:
    element: "Fine permission: passed"
    direction: DOWN
    timeout: 15000

- assertVisible:
    id: "android-request-options-fine-denied-result"
- assertVisible:
    text: ".*PERMISSION_DENIED.*granularity=fine.*"
