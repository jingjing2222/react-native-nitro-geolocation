appId: nitrogeolocation.example
---
# Current position contract: successful native request plus denied permission
# rejection, without accepting stale display-only state.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/current-position
- runFlow:
    when:
      platform: iOS
      visible: "Open in.*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/current-position
- waitForAnimationToEnd

# First ensure we have permission
- tapOn:
    id: "e2e-action-permission-request-button"
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

# Navigate within the current-position contract page
- setLocation:
    latitude: 37.5665
    longitude: 126.9780

# Get current position
- tapOn:
    id: "e2e-action-current-position-get-button"

# Wait for position to be fetched
- extendedWaitUntil:
    visible:
      id: "position-info"
    timeout: 15000

# Verify position data is displayed using testID
- assertVisible:
    id: "position-info"
- assertVisible:
    id: "latitude-text"
- assertVisible:
    text: "Latitude: 37\\.566500"
- assertVisible:
    id: "longitude-text"
- assertVisible:
    text: "Longitude: 126\\.978000"
- assertVisible:
    id: "accuracy-text"

- launchApp:
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/current-position
- runFlow:
    when:
      platform: iOS
      visible: "Open in.*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/current-position
- waitForAnimationToEnd

- tapOn:
    id: "e2e-action-current-position-get-button"

- extendedWaitUntil:
    visible: "Error: .*(Location permission|denied access).*"
    timeout: 10000

- assertVisible:
    id: "current-position-error"
