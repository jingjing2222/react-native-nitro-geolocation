appId: nitrogeolocation.example
---
# Current position contract: successful native request plus denied permission
# rejection, without accepting stale display-only state.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/current-position
- tapOn:
    text: "열기|Open"
    optional: true

# First ensure we have permission
- tapOn: "Request"
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

# Navigate within the current-position contract page
- scrollUntilVisible:
    element: "2. Get Current Position"
    direction: DOWN

# Provide a real device location before exercising the native request.
- setLocation:
    latitude: 37.5665
    longitude: 126.9780

# Get current position
- tapOn: "Get Position"

# Wait for position to be fetched
- extendedWaitUntil:
    visible: "Current Position"
    timeout: 15000

# Verify position data is displayed using testID
- assertVisible:
    id: "position-info"
- assertVisible:
    id: "latitude-text"
- assertVisible:
    text: "Latitude: 37\\.566500"
- assertVisible:
    id: "longitude-text"
- assertVisible:
    text: "Longitude: 126\\.978000"
- assertVisible:
    id: "accuracy-text"

- launchApp:
    clearState: true
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/current-position
- tapOn:
    text: "열기|Open"
    optional: true

- scrollUntilVisible:
    element: "2. Get Current Position"
    direction: DOWN

- tapOn: "Get Position"

- extendedWaitUntil:
    visible: "Error: .*(Location permission|denied access).*"
    timeout: 10000

- assertVisible:
    id: "current-position-error"
