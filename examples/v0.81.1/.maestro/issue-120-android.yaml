appId: nitrogeolocation.example
---
# Repro for #120 on Android. iOS-only issue is skipped on this platform.

- launchApp:
    clearState: true

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 30000

- stopApp

- openLink:
    link: nitrogeolocation://app/issue-120
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/issue-120
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Issue 120"
    timeout: 15000

- tapOn:
    id: "e2e-action-issue-120-run-button"
- extendedWaitUntil:
    visible: "Issue 120: passed"
    timeout: 15000
- assertVisible:
    id: "issue-120-stop-without-motion-result"
