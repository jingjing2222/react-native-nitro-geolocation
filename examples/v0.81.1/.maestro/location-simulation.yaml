appId: nitrogeolocation.example
---
# Location simulation contract: each request must render the newly simulated
# coordinates rather than any previous display-only position block.

- launchApp:
    clearState: true
    permissions:
      all: allow

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/location-simulation
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/location-simulation
- waitForAnimationToEnd

# Request permission
- tapOn:
    id: "e2e-action-permission-request-button"
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

# Navigate within the location-simulation contract page
- setLocation:
    latitude: 37.7749
    longitude: -122.4194

- tapOn:
    id: "e2e-action-current-position-get-button"
- extendedWaitUntil:
    visible:
      id: "position-info"
    timeout: 15000

# Verify position loaded
- assertVisible:
    id: "position-info"
- assertVisible:
    text: "Latitude: 37\\.774900"
- assertVisible:
    text: "Longitude: -122\\.419400"

# Simulate location: New York
- setLocation:
    latitude: 40.7128
    longitude: -74.0060

- tapOn:
    id: "e2e-action-current-position-get-button"
- extendedWaitUntil:
    visible:
      id: "position-info"
    timeout: 15000

# Verify position loaded
- assertVisible:
    id: "position-info"
- assertVisible:
    text: "Latitude: 40\\.712800"
- assertVisible:
    text: "Longitude: -74\\.006000"

# Simulate location: Seoul
- setLocation:
    latitude: 37.5665
    longitude: 126.9780

- tapOn:
    id: "e2e-action-current-position-get-button"
- extendedWaitUntil:
    visible:
      id: "position-info"
    timeout: 15000

# Verify position loaded
- assertVisible:
    id: "position-info"
- assertVisible:
    text: "Latitude: 37\\.566500"
- assertVisible:
    text: "Longitude: 126\\.978000"
