appId: nitrogeolocation.example
---
# Location simulation contract: each request must render the newly simulated
# coordinates rather than any previous display-only position block.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/location-simulation
- tapOn:
    text: "열기|Open"
    optional: true

# Request permission
- tapOn: "Request"
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

# Navigate within the location-simulation contract page
- scrollUntilVisible:
    element: "2. Get Current Position"
    direction: DOWN

# Simulate location: San Francisco
- setLocation:
    latitude: 37.7749
    longitude: -122.4194

- tapOn: "Get Position"
- extendedWaitUntil:
    visible: "Current Position"
    timeout: 15000

# Verify position loaded
- assertVisible:
    id: "position-info"
- assertVisible:
    text: "Latitude: 37\\.774900"
- assertVisible:
    text: "Longitude: -122\\.419400"

# Simulate location: New York
- setLocation:
    latitude: 40.7128
    longitude: -74.0060

- tapOn: "Get Position"
- extendedWaitUntil:
    visible: "Current Position"
    timeout: 15000

# Verify position loaded
- assertVisible:
    id: "position-info"
- assertVisible:
    text: "Latitude: 40\\.712800"
- assertVisible:
    text: "Longitude: -74\\.006000"

# Simulate location: Seoul
- setLocation:
    latitude: 37.5665
    longitude: 126.9780

- tapOn: "Get Position"
- extendedWaitUntil:
    visible: "Current Position"
    timeout: 15000

# Verify position loaded
- assertVisible:
    id: "position-info"
- assertVisible:
    text: "Latitude: 37\\.566500"
- assertVisible:
    text: "Longitude: 126\\.978000"
