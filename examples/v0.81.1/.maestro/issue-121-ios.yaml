appId: nitrogeolocation.example
---
# Repro for #121 on iOS. Android-only issue is skipped on this platform.

- launchApp:
    clearState: true

- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 30000

- stopApp

- openLink:
    link: nitrogeolocation://app/issue-121
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/issue-121
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Issue 121"
    timeout: 15000

- tapOn:
    id: "e2e-action-issue-121-run-button"
- extendedWaitUntil:
    visible: "Issue 121: passed"
    timeout: 15000
- assertVisible:
    id: "issue-121-foreground-service-result"
