appId: nitrogeolocation.example
---
# iOS contract: mocked=false
#
# Run this on a physical iOS device/provider that is not using simulated
# location. It is intentionally not included in all-tests.yaml because
# simulator setLocation() state can persist outside app state.
#
# Do not add setLocation() to this flow. For mocked=false, the contract is about
# source metadata from a real/non-simulated provider; injected coordinates must
# not be part of the assertion logic.

- launchApp:
    clearState: true

- stopApp

- openLink:
    link: nitrogeolocation://app/mocked-metadata
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/mocked-metadata
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Mocked location metadata contract"
    timeout: 10000

- tapOn:
    id: "e2e-action-permission-request-button"
- tapOn:
    text: "Allow While Using App|앱을 사용하는 동안 허용"
    optional: true
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

- tapOn:
    id: "e2e-action-current-position-get-button"

- extendedWaitUntil:
    visible:
      id: "position-info"
    timeout: 15000

- assertVisible:
    id: "position-info"
- assertVisible:
    id: "mocked-text"
- assertVisible: "Mocked: false"
- assertNotVisible: "Mocked: true"
- assertVisible:
    id: "provider-text"
- assertVisible: "Provider: unknown"
