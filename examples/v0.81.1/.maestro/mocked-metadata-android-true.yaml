appId: nitrogeolocation.example
---
# Android contract: mocked=true
#
# This flow verifies the mocked-location branch only. Maestro setLocation()
# injects a test-provider location, so Android should expose mocked=true and
# a native provider through the modern metadata response. Coordinate injection is
# part of this true-case fixture.

- launchApp:
    clearState: true
    permissions:
      android.permission.ACCESS_COARSE_LOCATION: allow
      android.permission.ACCESS_FINE_LOCATION: allow

- stopApp

- openLink:
    link: nitrogeolocation://app/mocked-metadata
- runFlow:
    when:
      platform: iOS
      visible: ".*NitroGeolocationExample.*"
    commands:
      - tapOn:
          text: "Open|열기"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Mocked location metadata contract"
    timeout: 10000

- tapOn:
    id: "e2e-action-permission-request-button"
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "e2e-action-current-position-get-button"

- extendedWaitUntil:
    visible:
      id: "position-info"
    timeout: 15000

- assertVisible:
    id: "position-info"
- assertVisible:
    id: "latitude-text"
- assertVisible:
    id: "longitude-text"
- assertVisible:
    id: "mocked-text"
- assertVisible: "Mocked: true"
- assertNotVisible: "Mocked: false"
- assertVisible:
    id: "provider-text"
- assertVisible: "Provider: (fused|gps|network|passive)"
