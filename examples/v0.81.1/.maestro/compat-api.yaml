appId: nitrogeolocation.example
---
# User flow: select the legacy Compat API tab, request authorization, then
# fetch and inspect a current position through the callback API.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/compat
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/compat
- waitForAnimationToEnd
- tapOn:
    text: "Compat API, tab, 8 of 8|Compat API"
    optional: true

- extendedWaitUntil:
    visible: "Compat API"
    timeout: 10000

- tapOn:
    id: "e2e-action-compat-request-authorization-button"
- tapOn:
    text: "Allow While Using App|앱을 사용하는 동안 허용|OK"
    optional: true
- extendedWaitUntil:
    visible: "Granted ✅"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "e2e-action-compat-get-current-position-button"

- assertVisible:
    id: "position-info"
- assertVisible:
    id: "latitude-text"
- assertVisible:
    text: "Latitude: 37\\.566500"
- assertVisible:
    id: "longitude-text"
- assertVisible:
    text: "Longitude: 126\\.978000"
- assertVisible:
    id: "accuracy-text"
