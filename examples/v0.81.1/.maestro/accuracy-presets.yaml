appId: nitrogeolocation.example
---
# Accuracy presets: exercise real native requests and negative contracts.

- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/accuracy-presets
- tapOn:
    text: "열기|Open"
    optional: true

- extendedWaitUntil:
    visible: "Native request contract for platform accuracy options"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "accuracy-presets-run-positive-button"

- extendedWaitUntil:
    visible: "Positive presets: passed"
    timeout: 60000

- assertVisible:
    id: "accuracy-presets-positive-result"
- assertVisible:
    id: "accuracy-presets-scenario-message"

- scrollUntilVisible:
    element: "3. Invalid Preset"
    direction: DOWN

- tapOn:
    id: "accuracy-presets-run-invalid-button"

- extendedWaitUntil:
    visible: "Invalid preset: passed"
    timeout: 10000

- assertVisible:
    id: "accuracy-presets-invalid-result"
- assertVisible:
    id: "accuracy-presets-invalid-message"

- stopApp

- launchApp:
    clearState: true
    permissions:
      all: deny

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/accuracy-presets
- tapOn:
    text: "열기|Open"
    optional: true

- extendedWaitUntil:
    visible: "Native request contract for platform accuracy options"
    timeout: 10000

- scrollUntilVisible:
    element: "4. Permission Denied"
    direction: DOWN

- tapOn:
    id: "accuracy-presets-run-denied-button"

- extendedWaitUntil:
    visible: "Permission denied: passed"
    timeout: 10000

- assertVisible:
    id: "accuracy-presets-denied-result"
- scrollUntilVisible:
    element:
      text: ".*PERMISSION_DENIED.*"
    direction: DOWN
- assertVisible:
    text: ".*PERMISSION_DENIED.*"
