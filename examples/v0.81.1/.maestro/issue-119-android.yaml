appId: nitrogeolocation.example
---
# Repro for #119 on Android. Regression contract fails on main while bug exists.

- launchApp:
    clearState: true
    permissions:
      all: deny
      android.permission.ACCESS_COARSE_LOCATION: deny
      android.permission.ACCESS_FINE_LOCATION: deny
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- tapOn:
    text: "Wait|대기"
    optional: true

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 30000

- stopApp

- openLink:
    link: nitrogeolocation://app/issue-119
- runFlow:
    when:
      platform: Android
      visible: ".*isn't responding|.*응답하지 않.*"
    commands:
      - tapOn:
          text: "Wait|대기"
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/issue-119
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Issue 119"
    timeout: 15000

- tapOn:
    id: "e2e-action-issue-119-run-button"
- tapOn:
    text: ".*(While using the app|앱 사용 중에만 허용|Allow).*"
    optional: true
- extendedWaitUntil:
    visible: "Issue 119: passed"
    timeout: 15000
- assertVisible:
    id: "issue-119-permission-prompt-result"
