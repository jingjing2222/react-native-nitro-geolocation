appId: nitrogeolocation.example
---
# iOS contract: mocked=true
#
# This flow verifies the simulated-location branch. Maestro setLocation()
# updates the simulator location, so iOS 15+ should expose mocked=true through
# CLLocation sourceInformation. Coordinate injection is part of this true-case
# fixture.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Geolocation API"
    timeout: 10000

- stopApp

- openLink:
    link: nitrogeolocation://app/mocked-metadata
- runFlow:
    when:
      platform: iOS
      visible: "Cancel|취소"
    commands:
      - tapOn:
          text: "Open|열기"
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink:
          link: nitrogeolocation://app/mocked-metadata
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Mocked location metadata contract"
    timeout: 10000

- tapOn:
    id: "e2e-action-permission-request-button"
- tapOn:
    text: "Allow While Using App|앱을 사용하는 동안 허용"
    optional: true
- extendedWaitUntil:
    visible: "granted ✅"
    timeout: 10000

- setLocation:
    latitude: 37.5665
    longitude: 126.978

- tapOn:
    id: "e2e-action-current-position-get-button"

- extendedWaitUntil:
    visible:
      id: "position-info"
    timeout: 15000

- assertVisible:
    id: "position-info"
- assertVisible:
    id: "latitude-text"
- assertVisible:
    id: "longitude-text"
- assertVisible:
    id: "mocked-text"
- assertVisible: "Mocked: true"
- assertNotVisible: "Mocked: false"
- assertVisible:
    id: "provider-text"
- assertVisible: "Provider: unknown"
